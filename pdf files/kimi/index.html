<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pamilerin CV - PDF Template</title>
    <link rel="stylesheet" href="styles.css">
    <base target="_blank">
</head>

<body>

    <!-- Main A4 Page Container -->
    <div id="cv-page" class="cv-page">

        <!-- Header Section -->
        <header id="cv-header" class="cv-header"></header>

        <!-- Professional Summary Section -->
        <section id="cv-summary" class="cv-section cv-section--summary"></section>

        <!-- Work History Section -->
        <section id="cv-work" class="cv-section cv-section--work"></section>

        <!-- Skills Section -->
        <section id="cv-skills" class="cv-section cv-section--skills"></section>

        <!-- Education Section -->
        <section id="cv-education" class="cv-section cv-section--education"></section>

        <!-- Certifications Section -->
        <section id="cv-certifications" class="cv-section cv-section--certifications"></section>

        <!-- Research & Publications Section -->
        <section id="cv-research" class="cv-section cv-section--research"></section>

        <!-- Core Competence Section -->
        <section id="cv-competence" class="cv-section cv-section--competence"></section>

        <!-- References Section -->
        <section id="cv-references" class="cv-section cv-section--references"></section>

    </div>

    <script src="data.js"></script>
    <script src="render.js"></script>
</body>

</html>
